services:
  - type: web
    name: wao-api
    runtime: node
    plan: free
    region: ohio
    buildCommand: pnpm install && pnpm --filter @wao/shared build && pnpm --filter @wao/api build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: WHATSAPP_VERIFY_TOKEN
        generateValue: true
      - key: PHONE_HASH_SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
